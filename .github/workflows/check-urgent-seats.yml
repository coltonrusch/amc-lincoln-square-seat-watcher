name: Urgent AMC Seat Scan

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Widen seat zone to verify the pipeline"
        type: boolean
        default: false
      force_all_due:
        description: "Check every showtime inside 48 hours, ignoring cadence tiers"
        type: boolean
        default: false

concurrency:
  group: amc-seat-watcher-urgent
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: node amc-node.js
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          TEST_MODE: ${{ inputs.test_mode }}
          SCAN_MODE: urgent
          FORCE_URGENT_SCAN: ${{ inputs.force_all_due }}
