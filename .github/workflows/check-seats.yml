name: Broad AMC Seat Scan

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Widen seat zone (any row, cols 1-100) to verify pipeline"
        type: boolean
        default: false

concurrency:
  group: amc-seat-watcher-broad
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: node amc-node.js
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL: ${{ secrets.NOTIFY_EMAIL }}
          TEST_MODE: ${{ inputs.test_mode }}
          SCAN_MODE: broad
